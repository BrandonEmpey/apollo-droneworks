            transition: transform 0.3s ease;
        }
        .orthomosaic-viewer:active {
            cursor: grabbing;
        }
        .measurement-point {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #ff6b6b;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            animation: ping 3s infinite;
        }
        @keyframes ping {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.9; }
        }
        .point-1 { top: 20%; left: 15%; }
        .point-2 { top: 25%; left: 45%; }
        .point-3 { top: 30%; left: 75%; }
        .point-4 { top: 55%; left: 25%; }
        .point-5 { top: 60%; left: 60%; }
        .point-6 { top: 65%; left: 85%; }
        .survey-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .survey-btn {
            background: rgba(0,0,0,0.8);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            min-width: 140px;
        }
        .survey-btn:hover {
            background: rgba(0,0,0,0.95);
        }
        .survey-btn.active {
            background: #ffdd33;
            color: #000;
        }
        .info-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
        }
        .measurement-tooltip {
            position: absolute;
            background: rgba(255, 107, 107, 0.95);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .layer-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            min-width: 200px;
        }
        .layer-option {
            display: flex;
            align-items: center;
            margin: 8px 0;
            cursor: pointer;
        }
        .layer-option input {
            margin-right: 8px;
        }
        .zoom-controls {
            position: absolute;
            bottom: 100px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .zoom-btn {
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.8);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="survey-container">
        <div class="orthomosaic-viewer" id="orthomosaicViewer">
            <div class="measurement-point point-1" data-area="Field A: 25.7 acres" data-coords="38°46'12.3&quot;N 109°32'45.1&quot;W"></div>
            <div class="measurement-point point-2" data-area="Field B: 18.4 acres" data-coords="38°46'10.8&quot;N 109°32'42.5&quot;W"></div>
            <div class="measurement-point point-3" data-area="Field C: 31.2 acres" data-coords="38°46'09.2&quot;N 109°32'39.8&quot;W"></div>
            <div class="measurement-point point-4" data-area="Field D: 22.1 acres" data-coords="38°46'06.7&quot;N 109°32'44.2&quot;W"></div>
            <div class="measurement-point point-5" data-area="Field E: 16.8 acres" data-coords="38°46'04.1&quot;N 109°32'41.6&quot;W"></div>
            <div class="measurement-point point-6" data-area="Field F: 10.8 acres" data-coords="38°46'02.5&quot;N 109°32'38.9&quot;W"></div>
        </div>
        
        <div class="layer-panel">
            <h4 style="margin: 0 0 10px 0; color: #ffdd33;">Survey Layers</h4>
            <div class="layer-option">
                <input type="checkbox" id="orthomosaic" checked>
                <label for="orthomosaic">Orthomosaic Map</label>
            </div>
            <div class="layer-option">
                <input type="checkbox" id="elevation" checked>
                <label for="elevation">Elevation Data</label>
            </div>
            <div class="layer-option">
                <input type="checkbox" id="boundaries">
                <label for="boundaries">Property Boundaries</label>
            </div>
            <div class="layer-option">
                <input type="checkbox" id="vegetation">
                <label for="vegetation">Vegetation Index</label>
            </div>
        </div>
        
        <div class="survey-controls">
            <button class="survey-btn" onclick="toggleMeasureMode()">Measure Tool</button>
            <button class="survey-btn" onclick="exportData()">Export Data</button>
            <button class="survey-btn" onclick="generateReport()">Generate Report</button>
            <button class="survey-btn" onclick="toggleFullscreen()">Fullscreen</button>
        </div>
        
        <div class="zoom-controls">
            <button class="zoom-btn" onclick="zoomIn()">+</button>
            <button class="zoom-btn" onclick="zoomOut()">-</button>
        </div>
        
        <div class="info-overlay">
            <h3 style="margin: 0 0 10px 0; color: #ffdd33;">Survey Data Summary</h3>
            <p style="margin: 0; font-size: 14px; line-height: 1.4;">
                <strong>Total Area:</strong> 125 acres<br>
                <strong>Resolution:</strong> 2.1 cm/pixel<br>
                <strong>Elevation Range:</strong> 4,320 - 4,385 ft<br>
                <strong>Survey Date:</strong> May 28, 2025<br>
                Click measurement points for detailed field data.
            </p>
        </div>
        
        <div class="measurement-tooltip" id="measureTooltip"></div>
    </div>

    <script>
        let isDragging = false;
        let currentScale = 1;
        let currentX = 0;
        let currentY = 0;
        let measureMode = false;
        
        const viewer = document.getElementById('orthomosaicViewer');
        const tooltip = document.getElementById('measureTooltip');
        
        // Pan functionality
        viewer.addEventListener('mousedown', (e) => {
            if (!measureMode) {
                isDragging = true;
                viewer.style.cursor = 'grabbing';
            }
        });
        
        document.addEventListener('mousemove', (e) => {
            if (isDragging && !measureMode) {
                currentX += e.movementX;
                currentY += e.movementY;
                updateTransform();
            }
        });
        
        document.addEventListener('mouseup', () => {
            isDragging = false;
            viewer.style.cursor = measureMode ? 'crosshair' : 'grab';
        });
        
        // Zoom functionality
        viewer.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY * -0.01;
            currentScale = Math.min(Math.max(0.5, currentScale + delta), 3);
            updateTransform();
        });
        
        function updateTransform() {
            viewer.style.transform = `scale(${currentScale}) translate(${currentX}px, ${currentY}px)`;
        }
        
        // Measurement point interactions
        document.querySelectorAll('.measurement-point').forEach(point => {
            point.addEventListener('mouseenter', (e) => {
                const area = e.target.dataset.area;
                const coords = e.target.dataset.coords;
                tooltip.innerHTML = `${area}<br><small>${coords}</small>`;
                tooltip.style.opacity = '1';
            });
            
            point.addEventListener('mousemove', (e) => {
                tooltip.style.left = e.pageX + 15 + 'px';
                tooltip.style.top = e.pageY - 15 + 'px';
            });
            
            point.addEventListener('mouseleave', () => {
                tooltip.style.opacity = '0';
            });
            
            point.addEventListener('click', (e) => {
                const area = e.target.dataset.area;
                const coords = e.target.dataset.coords;
                alert(`Field Details:\n${area}\nCoordinates: ${coords}\nSoil Type: Loam\nDrainage: Good\nSlope: 2.3°`);
            });
        });
        
        function toggleMeasureMode() {
            measureMode = !measureMode;
            viewer.style.cursor = measureMode ? 'crosshair' : 'grab';
            const btn = event.target;
            btn.classList.toggle('active');
            btn.textContent = measureMode ? 'Exit Measure' : 'Measure Tool';
        }
        
        function zoomIn() {
            currentScale = Math.min(3, currentScale * 1.2);
            updateTransform();
        }
        
        function zoomOut() {
            currentScale = Math.max(0.5, currentScale / 1.2);
            updateTransform();
        }
        
        function exportData() {
            alert('Exporting survey data:\n• GeoTIFF orthomosaic\n• DEM elevation model\n• KML boundary files\n• CSV measurement data');
        }
        
        function generateReport() {
            alert('Generating comprehensive survey report with:\n• Field measurements\n• Elevation analysis\n• Vegetation assessment\n• Recommended actions');
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // Layer toggles
        document.querySelectorAll('.layer-option input').forEach(checkbox => {
            checkbox.addEventListener('change', (e) => {
                console.log(`Layer ${e.target.id} ${e.target.checked ? 'enabled' : 'disabled'}`);
                // In a real implementation, this would toggle map layers
            });
        });
    </script>
</body>
</html>
